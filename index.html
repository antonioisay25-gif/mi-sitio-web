<body>
	<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primera Web</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Página en línea! 🚀</h1>
        <p>Este es un código de prueba funcionando en internet.</p>
        <button onclick="saludo()">Haz clic aquí</button>
    </div>
    <script>
        function saludo() { alert('¡Tu código también funciona!'); }
    </script>
</body>
</html>

</body>
